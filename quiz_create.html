<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Quiz – QuizCraft</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --primary:#0a0a0a; --accent:#7c3aed; --accent2:#06b6d4; --accent3:#f59e0b; --surface:#141414; --surface2:#1e1e1e; --text:#f5f5f5; --muted:#888; --border:#2a2a2a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--primary); color:var(--text); font-family:'DM Sans',sans-serif; }
    h1,h2,h3,h4 { font-family:'Syne',sans-serif; }
    .navbar { background:rgba(10,10,10,0.95); border-bottom:1px solid var(--border); backdrop-filter:blur(10px); padding:1rem 0; position:sticky; top:0; z-index:999; }
    .navbar-brand { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; color:var(--text)!important; letter-spacing:-1px; }
    .navbar-brand span { color:var(--accent); }
    .nav-link { color:var(--muted)!important; font-weight:500; }
    .nav-link:hover { color:var(--accent)!important; }
    .btn-accent { background:var(--accent); color:#fff; font-weight:700; border:none; padding:0.55rem 1.4rem; border-radius:6px; font-family:'Syne',sans-serif; transition:transform 0.2s,box-shadow 0.2s; cursor:pointer; }
    .btn-accent:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,0.4); color:#fff; }
    .btn-outline-accent { border:1.5px solid var(--accent); color:var(--accent); background:transparent; padding:0.5rem 1.2rem; border-radius:6px; font-family:'Syne',sans-serif; font-weight:600; transition:all 0.2s; cursor:pointer; }
    .btn-outline-accent:hover { background:var(--accent); color:#fff; }
    .btn-success-soft { background:rgba(20,240,160,0.1); border:1px solid rgba(20,240,160,0.3); color:#14f0a0; padding:0.5rem 1.2rem; border-radius:6px; font-family:'Syne',sans-serif; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .btn-success-soft:hover { background:rgba(20,240,160,0.2); }
    .btn-danger-soft { background:rgba(255,80,80,0.1); border:1px solid rgba(255,80,80,0.2); color:#f87171; padding:0.4rem 0.8rem; border-radius:6px; font-size:0.85rem; cursor:pointer; transition:all 0.2s; }
    .btn-danger-soft:hover { background:rgba(255,80,80,0.2); }

    .card-dark { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:1.2rem; }
    .form-label-dark { font-size:0.85rem; color:var(--muted); margin-bottom:0.4rem; display:block; font-weight:500; }
    .form-control-dark { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:0.7rem 1rem; border-radius:8px; outline:none; font-family:'DM Sans',sans-serif; transition:border-color 0.2s; }
    .form-control-dark:focus { border-color:var(--accent); }
    .form-control-dark::placeholder { color:var(--muted); }
    select.form-control-dark option { background:var(--surface2); }

    /* QUESTION CARD */
    .question-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:1rem; position:relative; transition:border-color 0.2s; }
    .question-card:hover { border-color:rgba(124,58,237,0.4); }
    .q-number { background:var(--accent); color:#fff; width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem; flex-shrink:0; }
    .option-row { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.6rem; }
    .option-label { width:28px; height:28px; border-radius:6px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:600; color:var(--muted); flex-shrink:0; }
    .option-label.correct { background:rgba(20,240,160,0.15); border-color:rgba(20,240,160,0.4); color:#14f0a0; }
    .correct-radio { accent-color:#14f0a0; width:16px; height:16px; cursor:pointer; flex-shrink:0; }

    /* PROGRESS */
    .progress-bar-custom { background:var(--surface2); border-radius:4px; height:6px; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:4px; transition:width 0.3s; }

    .toast-msg { position:fixed; bottom:2rem; right:2rem; background:var(--accent); color:#fff; padding:1rem 1.5rem; border-radius:8px; font-weight:700; font-family:'Syne',sans-serif; display:none; z-index:9999; }
    footer { background:var(--primary); border-top:1px solid var(--border); padding:1.5rem 0; text-align:center; color:var(--muted); font-size:0.85rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="quiz_index.html">Quiz<span>Craft</span></a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item"><a class="nav-link" href="quiz_listing.html">Browse Quizzes</a></li>
        <li class="nav-item ms-2"><a href="quiz_login.html" class="btn btn-outline-accent btn-sm">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4" style="max-width:800px;">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
      <h1 style="font-size:1.6rem;letter-spacing:-0.5px;">✏️ Create a Quiz</h1>
      <div style="color:var(--muted);font-size:0.9rem;">Add questions and publish your quiz</div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn-outline-accent" onclick="saveDraft()">Save Draft</button>
      <button class="btn-accent" onclick="publishQuiz()">🚀 Publish Quiz</button>
    </div>
  </div>

  <!-- QUIZ INFO -->
  <div class="card-dark">
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:1.2rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-size:0.8rem;">Quiz Details</h2>
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label-dark">Quiz Title *</label>
        <input type="text" class="form-control-dark" id="quizTitle" placeholder="e.g. Python Basics Quiz"/>
      </div>
      <div class="col-md-6">
        <label class="form-label-dark">Category</label>
        <select class="form-control-dark" id="quizCategory">
          <option>Technology</option>
          <option>Science</option>
          <option>Mathematics</option>
          <option>General Knowledge</option>
          <option>History</option>
          <option>Geography</option>
          <option>Sports</option>
          <option>Entertainment</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label-dark">Difficulty</label>
        <select class="form-control-dark" id="quizDifficulty">
          <option>Easy</option>
          <option>Medium</option>
          <option>Hard</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label-dark">Description (optional)</label>
        <textarea class="form-control-dark" id="quizDesc" rows="2" placeholder="Brief description of what this quiz covers..."></textarea>
      </div>
      <div class="col-md-6">
        <label class="form-label-dark">Time Limit (minutes)</label>
        <input type="number" class="form-control-dark" id="quizTime" value="10" min="1" max="60"/>
      </div>
      <div class="col-md-6">
        <label class="form-label-dark">Pass Score (%)</label>
        <input type="number" class="form-control-dark" id="quizPass" value="60" min="1" max="100"/>
      </div>
    </div>
  </div>

  <!-- QUESTIONS -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 style="font-size:1rem;font-weight:700;font-family:'Syne',sans-serif;">Questions <span id="qCount" style="color:var(--accent);">(1)</span></h2>
    <div style="font-size:0.85rem;color:var(--muted);">✅ Green radio = correct answer</div>
  </div>

  <div id="questionsContainer"></div>

  <button class="btn-success-soft w-100 py-3 mb-4" onclick="addQuestion()">
    <i class="bi bi-plus-circle me-2"></i> Add Question
  </button>

  <!-- SUBMIT -->
  <div class="card-dark" style="background:rgba(124,58,237,0.05);border-color:rgba(124,58,237,0.2);">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;">Ready to publish?</div>
        <div style="color:var(--muted);font-size:0.88rem;">Your quiz will be visible to all users.</div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn-outline-accent" onclick="saveDraft()">Save Draft</button>
        <button class="btn-accent" onclick="publishQuiz()">🚀 Publish Quiz</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-msg" id="toast"></div>

<footer>
  <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:0.5rem;">Quiz<span style="color:var(--accent)">Craft</span></div>
  © 2024 QuizCraft. Built for CodSoft Internship.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let questionCount = 0;

function addQuestion() {
  questionCount++;
  document.getElementById('qCount').textContent = `(${questionCount})`;
  const container = document.getElementById('questionsContainer');
  const qId = `q_${questionCount}`;

  const div = document.createElement('div');
  div.className = 'question-card';
  div.id = qId;
  div.innerHTML = `
    <div class="d-flex gap-3 align-items-start mb-3">
      <div class="q-number">${questionCount}</div>
      <input type="text" class="form-control-dark flex-grow-1" placeholder="Enter your question here..." id="${qId}_text"/>
      <button class="btn-danger-soft" onclick="removeQuestion('${qId}')"><i class="bi bi-trash"></i></button>
    </div>
    <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.8rem;font-weight:600;">OPTIONS — Select the correct answer (green radio)</div>
    <div id="${qId}_options">
      ${['A','B','C','D'].map((opt,i) => `
        <div class="option-row">
          <input type="radio" name="${qId}_correct" value="${i}" class="correct-radio" title="Mark as correct answer"/>
          <div class="option-label" id="${qId}_lbl_${i}">${opt}</div>
          <input type="text" class="form-control-dark" placeholder="Option ${opt}" id="${qId}_opt_${i}" style="margin-bottom:0;"/>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:0.8rem;display:flex;align-items:center;gap:0.5rem;">
      <span style="font-size:0.8rem;color:var(--muted);">Points:</span>
      <input type="number" class="form-control-dark" value="1" min="1" max="10" style="width:70px;margin-bottom:0;padding:0.4rem 0.6rem;"/>
    </div>
  `;
  container.appendChild(div);

  // Radio change → update label color
  div.querySelectorAll('.correct-radio').forEach((radio, i) => {
    radio.addEventListener('change', () => {
      div.querySelectorAll('.option-label').forEach(l => l.classList.remove('correct'));
      div.querySelector(`#${qId}_lbl_${i}`).classList.add('correct');
    });
  });
}

function removeQuestion(qId) {
  document.getElementById(qId)?.remove();
  questionCount = document.querySelectorAll('.question-card').length;
  document.getElementById('qCount').textContent = `(${questionCount})`;
}

function publishQuiz() {
  const title = document.getElementById('quizTitle').value.trim();
  if (!title) { showToast('⚠️ Please enter a quiz title!'); return; }
  if (questionCount === 0) { showToast('⚠️ Add at least one question!'); return; }

  // Save to localStorage
  const quiz = {
    id: Date.now(),
    title,
    category: document.getElementById('quizCategory').value,
    difficulty: document.getElementById('quizDifficulty').value,
    desc: document.getElementById('quizDesc').value,
    time: document.getElementById('quizTime').value,
    pass: document.getElementById('quizPass').value,
    questions: questionCount,
    created: new Date().toLocaleDateString()
  };

  const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
  quizzes.push(quiz);
  localStorage.setItem('quizzes', JSON.stringify(quizzes));

  showToast('🎉 Quiz published successfully!');
  setTimeout(() => window.location = 'quiz_listing.html', 1500);
}

function saveDraft() {
  const title = document.getElementById('quizTitle').value.trim();
  if (!title) { showToast('⚠️ Enter a title to save draft!'); return; }
  showToast('💾 Draft saved!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// Add first question by default
addQuestion();
</script>
</body>
</html>
