<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Take Quiz – QuizCraft</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --primary:#0a0a0a; --accent:#7c3aed; --accent2:#06b6d4; --accent3:#f59e0b; --surface:#141414; --surface2:#1e1e1e; --text:#f5f5f5; --muted:#888; --border:#2a2a2a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--primary); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
    h1,h2,h3 { font-family:'Syne',sans-serif; }
    .navbar { background:rgba(10,10,10,0.95); border-bottom:1px solid var(--border); backdrop-filter:blur(10px); padding:1rem 0; }
    .navbar-brand { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; color:var(--text)!important; letter-spacing:-1px; }
    .navbar-brand span { color:var(--accent); }
    .btn-accent { background:var(--accent); color:#fff; font-weight:700; border:none; padding:0.7rem 2rem; border-radius:8px; font-family:'Syne',sans-serif; font-size:1rem; transition:transform 0.2s; cursor:pointer; }
    .btn-accent:hover { transform:translateY(-2px); color:#fff; }
    .btn-outline-accent { border:1.5px solid var(--accent); color:var(--accent); background:transparent; padding:0.6rem 1.4rem; border-radius:8px; font-family:'Syne',sans-serif; font-weight:600; transition:all 0.2s; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn-outline-accent:hover { background:var(--accent); color:#fff; }

    .quiz-wrap { max-width:680px; margin:0 auto; padding:3rem 1rem; }

    /* PROGRESS */
    .progress-bar-wrap { background:var(--surface2); border-radius:6px; height:6px; margin-bottom:2rem; }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:6px; transition:width 0.4s ease; }

    /* TIMER */
    .timer { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.4rem 1rem; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
    .timer.warning { border-color:var(--accent3); color:var(--accent3); }
    .timer.danger { border-color:#f87171; color:#f87171; animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* QUESTION */
    .question-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2.5rem; }
    .q-meta { color:var(--muted); font-size:0.85rem; margin-bottom:1rem; }
    .q-text { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; line-height:1.5; margin-bottom:2rem; }

    /* OPTIONS */
    .option-btn { width:100%; background:var(--surface2); border:1.5px solid var(--border); color:var(--text); padding:1rem 1.2rem; border-radius:10px; text-align:left; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.95rem; transition:all 0.2s; margin-bottom:0.75rem; display:flex; align-items:center; gap:1rem; }
    .option-btn:hover:not(:disabled) { border-color:var(--accent); background:rgba(124,58,237,0.08); }
    .option-btn.selected { border-color:var(--accent); background:rgba(124,58,237,0.12); color:var(--text); }
    .option-btn.correct { border-color:#14f0a0; background:rgba(20,240,160,0.1); color:#14f0a0; }
    .option-btn.wrong { border-color:#f87171; background:rgba(248,113,113,0.1); color:#f87171; }
    .option-btn:disabled { cursor:not-allowed; }
    .option-letter { width:32px; height:32px; border-radius:6px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem; flex-shrink:0; }
    .option-btn.selected .option-letter { background:var(--accent); color:#fff; border-color:var(--accent); }
    .option-btn.correct .option-letter { background:#14f0a0; color:#000; border-color:#14f0a0; }
    .option-btn.wrong .option-letter { background:#f87171; color:#fff; border-color:#f87171; }

    /* FEEDBACK */
    .feedback-box { border-radius:10px; padding:1rem 1.2rem; margin-top:1rem; font-size:0.92rem; display:none; }
    .feedback-box.correct { background:rgba(20,240,160,0.1); border:1px solid rgba(20,240,160,0.3); color:#14f0a0; }
    .feedback-box.wrong { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:#f87171; }

    footer { background:var(--primary); border-top:1px solid var(--border); padding:1.5rem 0; text-align:center; color:var(--muted); font-size:0.85rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="quiz_index.html">Quiz<span>Craft</span></a>
    <div id="timerDisplay" class="timer">⏱ 10:00</div>
  </div>
</nav>

<div class="quiz-wrap">
  <div id="quizScreen">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
      <div id="quizTitleDisplay" style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;"></div>
      <div id="questionCounter" style="color:var(--muted);font-size:0.9rem;"></div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>

    <!-- Score Tracker -->
    <div class="d-flex gap-3 mb-3 flex-wrap">
      <div style="font-size:0.85rem;color:var(--muted);">✅ Correct: <span id="correctCount" style="color:#14f0a0;font-weight:700;">0</span></div>
      <div style="font-size:0.85rem;color:var(--muted);">❌ Wrong: <span id="wrongCount" style="color:#f87171;font-weight:700;">0</span></div>
    </div>

    <!-- Question Card -->
    <div class="question-card">
      <div class="q-meta" id="qMeta"></div>
      <div class="q-text" id="qText"></div>
      <div id="optionsContainer"></div>
      <div class="feedback-box" id="feedbackBox"></div>
      <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
        <button class="btn-outline-accent" id="prevBtn" onclick="prevQuestion()" style="display:none;">← Previous</button>
        <button class="btn-accent ms-auto" id="nextBtn" onclick="nextQuestion()" disabled>Next Question →</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:0.5rem;">Quiz<span style="color:var(--accent)">Craft</span></div>
  © 2024 QuizCraft. Built for CodSoft Internship.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const QUIZZES = {
  1: {
    title: "General Science Quiz",
    category: "Science",
    time: 600,
    questions: [
      { q: "What is the chemical symbol for water?", options: ["CO2", "H2O", "O2", "NaCl"], correct: 1 },
      { q: "How many planets are in our solar system?", options: ["7", "8", "9", "10"], correct: 1 },
      { q: "What is the powerhouse of the cell?", options: ["Nucleus", "Ribosome", "Mitochondria", "Chloroplast"], correct: 2 },
      { q: "What gas do plants absorb from the atmosphere?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], correct: 2 },
      { q: "What is the speed of light (approx)?", options: ["3×10⁸ m/s", "3×10⁶ m/s", "3×10¹⁰ m/s", "3×10⁴ m/s"], correct: 0 },
    ]
  },
  2: {
    title: "Python Basics Quiz",
    category: "Technology",
    time: 480,
    questions: [
      { q: "Which keyword is used to define a function in Python?", options: ["function", "def", "fun", "define"], correct: 1 },
      { q: "What is the output of: print(type([]))?", options: ["<class 'tuple'>", "<class 'list'>", "<class 'dict'>", "<class 'set'>"], correct: 1 },
      { q: "Which of these is NOT a Python data type?", options: ["int", "float", "char", "str"], correct: 2 },
      { q: "What does len([1,2,3]) return?", options: ["2", "3", "4", "Error"], correct: 1 },
      { q: "Which symbol is used for single-line comments in Python?", options: ["//", "/*", "#", "--"], correct: 2 },
    ]
  },
  3: {
    title: "World Geography",
    category: "Geography",
    time: 720,
    questions: [
      { q: "What is the capital of Japan?", options: ["Beijing", "Seoul", "Tokyo", "Bangkok"], correct: 2 },
      { q: "Which is the longest river in the world?", options: ["Amazon", "Nile", "Yangtze", "Mississippi"], correct: 1 },
      { q: "Which country has the largest population?", options: ["USA", "India", "China", "Russia"], correct: 1 },
      { q: "What is the smallest country in the world?", options: ["Monaco", "San Marino", "Vatican City", "Liechtenstein"], correct: 2 },
      { q: "Which continent is the Sahara Desert located in?", options: ["Asia", "Australia", "Africa", "South America"], correct: 2 },
    ]
  },
  4: {
    title: "Basic Mathematics",
    category: "Mathematics",
    time: 600,
    questions: [
      { q: "What is the square root of 144?", options: ["10", "11", "12", "13"], correct: 2 },
      { q: "What is 15% of 200?", options: ["25", "30", "35", "40"], correct: 1 },
      { q: "Solve: 2x + 5 = 15. What is x?", options: ["3", "4", "5", "6"], correct: 2 },
      { q: "What is the value of π (pi) approximately?", options: ["3.14", "3.41", "3.12", "3.16"], correct: 0 },
      { q: "What is 7 factorial (7!)?", options: ["2520", "5040", "720", "40320"], correct: 1 },
    ]
  }
};

const urlParams = new URLSearchParams(window.location.search);
const quizId = parseInt(urlParams.get('id')) || 1;
const quiz = QUIZZES[quizId] || QUIZZES[1];

let currentQ = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let answered = [];
let timeLeft = quiz.time;
let timerInterval;

document.getElementById('quizTitleDisplay').textContent = quiz.title;

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    const min = Math.floor(timeLeft / 60).toString().padStart(2,'0');
    const sec = (timeLeft % 60).toString().padStart(2,'0');
    const el = document.getElementById('timerDisplay');
    el.textContent = `⏱ ${min}:${sec}`;
    if (timeLeft <= 60) el.className = 'timer warning';
    if (timeLeft <= 10) el.className = 'timer danger';
    if (timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
  }, 1000);
}

function loadQuestion() {
  const q = quiz.questions[currentQ];
  const total = quiz.questions.length;

  document.getElementById('qMeta').textContent = `${quiz.category} · Question ${currentQ+1} of ${total}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('questionCounter').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('progressBar').style.width = `${((currentQ)/total)*100}%`;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = currentQ === total-1 ? 'Finish Quiz 🏁' : 'Next Question →';
  document.getElementById('prevBtn').style.display = currentQ > 0 ? 'block' : 'none';
  document.getElementById('feedbackBox').style.display = 'none';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = q.options.map((opt,i) => `
    <button class="option-btn" onclick="selectAnswer(${i})" id="opt_${i}">
      <div class="option-letter">${['A','B','C','D'][i]}</div>
      <span>${opt}</span>
    </button>
  `).join('');

  // Restore answer if already answered
  if (answered[currentQ] !== undefined) {
    const prev = answered[currentQ];
    highlightAnswer(prev, q.correct, false);
    document.getElementById('nextBtn').disabled = false;
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  }
}

function selectAnswer(selected) {
  const q = quiz.questions[currentQ];
  answered[currentQ] = selected;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  highlightAnswer(selected, q.correct, true);
  document.getElementById('nextBtn').disabled = false;
}

function highlightAnswer(selected, correct, updateScore) {
  document.querySelectorAll('.option-btn').forEach((btn,i) => {
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && selected !== correct) btn.classList.add('wrong');
  });

  const feedback = document.getElementById('feedbackBox');
  feedback.style.display = 'block';
  if (selected === correct) {
    feedback.className = 'feedback-box correct';
    feedback.innerHTML = '✅ Correct! Well done!';
    if (updateScore) { score++; correct_count++; document.getElementById('correctCount').textContent = ++correct; }
  } else {
    feedback.className = 'feedback-box wrong';
    feedback.innerHTML = `❌ Wrong! The correct answer is: <strong>${quiz.questions[currentQ].options[correct]}</strong>`;
    if (updateScore) { document.getElementById('wrongCount').textContent = ++wrong; }
  }
}

// Fix scoping
let correct_count = 0;

function nextQuestion() {
  if (currentQ < quiz.questions.length - 1) {
    currentQ++;
    loadQuestion();
  } else {
    finishQuiz();
  }
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; loadQuestion(); }
}

function finishQuiz() {
  clearInterval(timerInterval);
  const total = quiz.questions.length;
  const pct = Math.round((correct_count / total) * 100);
  sessionStorage.setItem('quizResult', JSON.stringify({
    title: quiz.title, score: correct_count, total, pct, wrong,
    timeTaken: quiz.time - timeLeft
  }));
  window.location = 'quiz_results.html';
}

startTimer();
loadQuestion();
</script>
</body>
</html>
